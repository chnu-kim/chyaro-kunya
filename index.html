<script>/* apply saved/system theme before first paint — no light-mode flash */try{var t=localStorage.getItem('ck-theme');if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<style>
  .home { padding: var(--space-8) 0 var(--space-9); }
  /* position 은 아래 쿼카 낙서가 이 상자의 바깥 여백을 기준점으로 쓰기 때문이다. */
  .home__hero { text-align: center; max-width: 640px; margin: 0 auto var(--space-8);
    position: relative; }
  .home__hero .chip { margin-bottom: var(--space-5); }
  /* 방송 캡처 세 장을 손으로 흩어 붙인 것. 컷아웃 스티커를 대신한다 — 스티커는
     받침 종이가 없어 줄노트 위에 떠 있었고, 라이트 테마에선 흰 종이 위의 흰
     다이컷 테두리가 보이지 않아 "오려 붙였다"는 신호가 통째로 사라졌다.
     폴라로이드는 그 자체가 종이라 두 문제를 같이 없앤다.

     크기가 절제된 이유: 이 화면의 플로리시는 아래 스크립트 헤드라인 하나이므로
     사진 무리가 그보다 커지면 둘이 싸운다.

     폭 상한 148 은 28vw 가 148 에 닿는 529px(=148/0.28) 부터, 하한 100 은
     357px(=100/0.28) 아래에서 걸린다. 가장 좁은 360px 에서 실측 폭은
     100.8 + 114.9 + 100.8 − 2×12.1 = 292.3px 이고, 좌우 여백 24px 을 뺀
     312px 안에 회전 삐져나옴까지 들어간다. 겹침·중간장 배율을 건드리면 이
     계산도 다시 한다. */
  .home__snaps { --snap-w: clamp(100px, 28vw, 148px);
    display: flex; justify-content: center; align-items: flex-start;
    margin: 0 auto var(--space-6); }

  /* 쉼 상태를 변수로 두는 건 아래 카드와 같은 이유다 — 각도를 transform 에 직접
     박으면 터치 리셋이 hover·focus 까지 삼킨다. */
  .snap { flex: 0 0 auto; width: var(--snap-w); margin: 0; padding: 7px 7px 5px;
    box-shadow: var(--shadow-card);
    --rest-rot: 0deg; --rest-y: 0px; --rest-z: 0;
    z-index: var(--rest-z);
    transform: rotate(var(--rest-rot)) translateY(var(--rest-y));
    transition: transform var(--dur-base) var(--ease-paper), box-shadow var(--dur-base); }
  .snap + .snap { margin-left: calc(var(--snap-w) * -0.12); }
  /* 가운데 장이 조금 크고 살짝 올라앉아 맨 위에 얹힌 것으로 읽힌다. 셋의 각도가
     서로의 거울상이 아닌 것도 "손으로 붙였다"는 신호다. */
  .snap:nth-child(1) { --rest-rot: -5deg; }
  .snap:nth-child(2) { --rest-rot: 2deg; --rest-y: -6px; --rest-z: 2;
    width: calc(var(--snap-w) * 1.14); }
  .snap:nth-child(3) { --rest-rot: -2.5deg; --rest-z: 1; }
  .snap:hover { transform: translateY(calc(var(--rest-y) - 4px));
    box-shadow: var(--shadow-lift); z-index: 3; }
  @media (hover: none) {
    .snap:hover { transform: rotate(var(--rest-rot)) translateY(var(--rest-y));
      box-shadow: var(--shadow-card); z-index: var(--rest-z); }
  }

  /* 정사각 슬롯. 사진을 갈아끼우는 계약이 여기 다 들어 있다:

     1) 정사각은 CSS 가 강제한다(aspect-ratio + cover). 그래서 교체본이 16:9 든
        세로든 상관없이 액자가 안 흔들린다 — 미리 크롭해 오지 않아도 된다.
     2) 피사체가 가운데가 아니면 --snap-pos 로 보는 지점만 옮긴다. 이미지를 다시
        만들 필요가 없다.
     3) 빗금은 지우지 않고 슬롯 배경으로 남긴다. 게임 보드가 쓰는 정직한
        플레이스홀더 언어라, 파일이 없을 때 같은 얼굴로 비어 보인다 — 같은
        사이트에서 "사진이 없다"가 두 가지 모양으로 말해질 이유가 없다.

     --thumb-* 를 생 hex 없이 쓸 수 있는 건 여기가 사진지 섬 안이라 라이트·다크
     양쪽에서 같은 크림으로 해석되기 때문이다. */
  .snap__slot { aspect-ratio: 1 / 1; overflow: hidden;
    background-color: var(--thumb-paper); border: 1px solid var(--thumb-edge);
    background-image: repeating-linear-gradient(135deg,
      transparent 0 9px, var(--thumb-mark) 9px 18px); }
  .snap__slot img { display: block; width: 100%; height: 100%;
    object-fit: cover; object-position: var(--snap-pos, 50% 50%); }

  /* 손글씨 캡션은 폴라로이드 기본값(25px)이 100px 짜리 종이엔 과하다. 20px 로
     낮췄고 캡션 길이가 여기 묶여 있다 — 폰트가 늦게 오면 한글이 전각 시스템
     폰트(~1.0em/자)로 떨어지므로 폴백 기준으로 재야 한다. 가장 좁은 종이의 안쪽
     폭은 100 − 14(좌우 패딩) = 86px 이고, 거기 놓인 세 글자 캡션의 폴백 폭은
     3 × 20 = 60px 이라 26px 이 남는다. 가운데 장은 1.14 배라 안쪽 폭이 100px 다.
     캡션을 늘릴 땐 글자 수 × 20 을 이 값과 먼저 대조한다 — 네 자면 80px 로
     이미 아슬아슬하다.

     색을 부품 기본값(브랜드 taupe)에서 되돌리는 이유가 크기와 묶여 있다. WCAG 의
     큰 텍스트 경계는 18pt(=24px)이고, 폴라로이드 기본 25px 은 그 위라 3:1 만
     넘기면 됐다 — taupe 는 종이 위 4.08 로 통과였다. 20px 로 낮추는 순간 기준이
     4.5 로 바뀌어 같은 색이 미달이 된다(다크 테마 사진지 #efe7df 위에선 3.34 로
     더 나쁘다). 크기를 줄이면서 색이 짊어지던 기준이 바뀐 것이고, 이 프로젝트
     토큰 중 정확히 그 자리를 위해 있는 게 --fg-muted 다 — 6.39 / 5.22 로 통과한다.
     taupe 로 되돌리려면 25px 도 같이 되돌려야 한다. */
  .snap figcaption { font-size: var(--text-lg); line-height: 1.1; margin-top: 5px;
    color: var(--fg-muted); }

  /* 클립 기본값(20×46)은 본문 카드용이라 이 종이엔 너무 크다 — 168.7px 짜리
     가운데 장에서 높이의 27% 를 먹고, 위쪽 여백이 7px 뿐이라 물 종이가 없어
     그대로 사진 위 머리카락에 얹혔다. 클립이 사진을 조금 덮는 건 실물도
     그러니 맞지만, 얼굴·머리를 덮으면 걸린 갈고리로 읽힌다.
     13×30 으로 줄이고 오른쪽 끝(right 10)으로 밀어 배경만 덮게 한다:
     가로는 168.7 − 10 − 13 = 145.7 부터라 사진 폭(7..161.7)의 89.7% 지점,
     세로는 −7 에서 30 만큼 내려와 사진 위 16px(사진 높이 154.7 의 10.3%)만
     걸친다. --snap-w 나 가운데 배율을 바꾸면 이 지점도 다시 잡는다. */
  .snap > .clip { width: 13px; height: 30px; top: -7px; right: 10px;
    border-width: 2.5px; border-radius: 7px; }

  /* 테이프는 라벨이 아니라 그냥 종잇조각이라 글자가 없다 — 컴포넌트 기본값은
     글자 크기로 높이를 만들므로 여기서 직접 준다. */
  .snap__tape { width: 44px; height: 14px; padding: 0; top: -6px; }
  .snap:nth-child(1) .snap__tape { left: 26%; transform: translateX(-50%) rotate(-9deg); }
  .snap:nth-child(3) .snap__tape { left: 72%; transform: translateX(-50%) rotate(7deg); }
  /* Face + tracking come from .t-script. The Korean wordmark resolves to Nanum
     Pen Script through --font-script (Sacramento has no Hangul) — a handwritten
     diary title, which is the point. */
  .home__hero h1 { font-size: var(--text-5xl); line-height: 1.05; }
  .home__hero p { color: var(--fg-muted); font-size: var(--text-lg); margin-top: var(--space-3); }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); }
  /* 쉼 상태를 --rest-rot/--rest-y 로 두는 게 핵심이다. 각도를 transform 에 직접
     박으면 아래 좁은-화면 쿼리가 transform 을 덮을 때 hover·active 까지 같이
     삼켜서, 좁은 창의 키보드 사용자가 lift 를 통째로 잃는다. 변수로 두면 쿼리는
     쉼 상태만 0 으로 덮고 상호작용 규칙은 하나로 유지된다. */
  .navcard { display: block; text-decoration: none; color: inherit; padding: var(--space-7);
    --rest-rot: 0deg; --rest-y: 0px;
    transform: rotate(var(--rest-rot)) translateY(var(--rest-y));
    transition: transform var(--dur-base) var(--ease-paper), box-shadow var(--dur-base); }
  /* 손으로 붙인 두 장이라 각도가 서로의 거울상이 아니다 — 왼쪽 장이 더 많이
     틀어진 채 살짝 내려앉고, 오른쪽은 거의 반듯하다. 세로 오프셋을 왼쪽에만
     주는 건 오른쪽 카드 아래 모서리에 마스코트 스티커가 붙어 있어서다. */
  .navcard:nth-child(1) { --rest-rot: -1.6deg; --rest-y: 9px; }
  .navcard:nth-child(2) { --rest-rot: .6deg; }
  .navcard:hover,
  .navcard:focus-visible { transform: translateY(calc(var(--rest-y) - 4px)); box-shadow: var(--shadow-lift); }
  .navcard:active { transform: translateY(var(--rest-y)); box-shadow: var(--shadow-card); }
  .navcard__ic { width: 44px; height: 44px; color: var(--fg); margin-bottom: var(--space-4); }
  .navcard h2 { font-size: var(--text-2xl); margin-bottom: var(--space-2); }
  .navcard p { color: var(--fg-muted); font-size: var(--text-sm); margin: 0; }

  /* Two columns only once a card can hold a readable measure. At 640px each
     card is 280px wide and 48px of padding leaves 184px of text — about 13
     Korean characters per line; at 601px it drops to 11. So the grid stacks
     well above the 600px "mobile" breakpoint, and only true mobile also loses
     the collage rotation and tightens the padding. */
  @media (max-width: 760px) {
    .cards { grid-template-columns: 1fr; }
    /* 세로 오프셋은 "나란히 붙인 두 장" 을 표현하는 값이라 1열에선 의미가 없다 —
       위아래로 쌓이면 그냥 카드 간격이 어긋난 것으로 보인다. */
    .navcard:nth-child(1) { --rest-y: 0px; }
  }
  @media (max-width: 600px) {
    .navcard { padding: var(--space-5); }
    .navcard:nth-child(1), .navcard:nth-child(2) { --rest-rot: 0deg; }
  }

  /* 발바닥 트레일 — 카드 쪽으로 걸어간 자국.
     Rotations now track one direction of travel instead of scattering across
     60°, the prints alternate above/below the path like real left/right feet,
     and each step is fainter than the next so the row reads as a receding
     trail rather than three evenly spaced glyphs. --paw-dim dims the whole
     trail in dark without flattening that per-step gradient. */
  .deco-paws { display: flex; justify-content: center; align-items: center; gap: 18px;
    color: var(--brand-taupe); margin-bottom: var(--space-7);
    pointer-events: none; user-select: none; }
  /* 쉼 각도·높이·크기를 변수로 뽑은 건 아래 등장 애니메이션 때문이다. 키프레임의
     transform 은 일반 선언을 이기므로, 각도를 transform 에 직접 박아 두면 등장이
     도는 동안 각도가 풀렸다가 끝에서 튕긴다 — site.css 의 rise 주석이 경고하는
     함정이고, 사진 콜라주가 쉼 각도를 변수로 뽑아 피해 간 것과 같은 방식이다. */
  .deco-paw { width: 22px; height: 22px; flex-shrink: 0;
    --paw-dim: 1; --paw-fade: .6;
    --rest-rot: 0deg; --rest-y: 0px; --rest-s: 1;
    opacity: calc(var(--paw-fade) * var(--paw-dim));
    transform: rotate(var(--rest-rot)) translateY(var(--rest-y)) scale(var(--rest-s)); }
  .deco-paw:nth-child(1) { --paw-fade: .40; --rest-rot: -10deg; --rest-y: 6px; --rest-s: .94; --paw-delay: 420ms; }
  .deco-paw:nth-child(2) { --paw-fade: .58; --rest-rot: 3deg; --rest-y: -5px; --paw-delay: 465ms; }
  .deco-paw:nth-child(3) { --paw-fade: .78; --rest-rot: 12deg; --rest-y: 5px; --rest-s: 1.04; --paw-delay: 510ms; }
  [data-theme="dark"] .deco-paw { --paw-dim: .85; }

  /* 발바닥은 올라오지 않고 찍힌다 — 위에서 조금 크게 내려와 제자리 크기로 앉는다.
     도장이 종이에 닿는 방향이고, 셋이 45ms 간격으로 이어지면 발자국 리듬이 된다.
     길이·이징은 rise 와 같은 값이라 한 언어 안에 있고 방향만 대상이 무엇인지를
     말한다. 끝 키프레임을 비워 둔 건 요소 자신의 쉼 상태(투명도는 --paw-fade,
     자세는 위 transform)로 안착시키기 위해서다 — 끝에 값을 적으면 그게 쉼 상태를
     덮어쓰고 애니메이션이 끝나는 순간 툭 튄다. */
  @keyframes paw-step {
    from { opacity: 0;
      transform: rotate(var(--rest-rot)) translateY(calc(var(--rest-y) - 5px))
                 scale(calc(var(--rest-s) * 1.15)); }
  }

  /* 마스코트 잉크 스티커 — 순수 장식(aria-hidden)이라 <img> 일 이유가 없다.
     src 로 두면 프리로드 스캐너가 라이트 버전을 먼저 받고 site.js 가 끝에서
     src 를 갈아끼우므로, 다크 사용자는 두 장(25KB + 29KB)을 받고 잘못된 쪽이
     한 프레임 보인다 — 페이지 전체가 무플래시 테마 스크립트를 쓰는데 이것만
     깜빡인다. 배경으로 두면 셀렉터에 걸린 한 장만 받고 깜빡임도 없다.
     절대 위치라 CLS 는 애초에 없고, 높이는 원본비(206:308)로 고정한다. */
  .cards-outer { position: relative; max-width: 880px; margin: 0 auto; }
  .mascot-sticker { position: absolute; bottom: -32px; right: -18px;
    width: 72px; height: 108px;
    background: url('assets/kunyang-mascot-ink.png') center / contain no-repeat;
    transform: rotate(-8deg); pointer-events: none; user-select: none; opacity: 0.88; }
  [data-theme="dark"] .mascot-sticker { background-image: url('assets/kunyang-mascot.png'); }

  /* 쿠냐가 그린 쿼카 낙서. 마스코트와 같은 이유로 배경 이미지고, 잉크 두 벌도
     마스코트와 같은 값이다 — 한 화면에 붙는 손그림 둘이 서로 다른 잉크면 한 손에서
     나온 걸로 안 보인다. 원본(482×319)에서 알파가 있는 범위만 잘라낸 190×248
     파생본을 쓰고, 폭·높이는 그 비율 그대로다.

     부품이 아니라 줄노트 여백에 건다: 카드 모서리에 맞춰 두면 "배치한 것"으로
     읽히고, 아무것에도 안 맞은 채 여백에 있어야 "그려 둔 것"으로 읽힌다.

     bottom 이 음수인 건 헤드라인을 피하려는 것이다. 이 화면의 플로리시는 스크립트
     헤드라인 하나뿐이라 낙서가 그 높이에 나란히 서면 둘이 싸운다 — bottom 이 8 일
     땐 실제로 49px 겹쳐 있었다. 값은 캡처에서 재서 잡았다(뷰포트 1523): 헤드라인
     글자가 y 487 에서 끝나고 문단이 535 에서 시작하는데, −80 이면 낙서가 526..645
     라서 헤드라인 아래 39px 부터 시작해 문단 줄 옆을 지나 발바닥 줄(706) 앞에서
     멈춘다. 이 좌표 하나를 게이트 전 구간에 그대로 써도 되는 건 --text-5xl 이
     clamp(3.5rem, 8vw, 5.5rem) 이라 88 ÷ 0.08 = 1100px 부터 상한에 붙박이고,
     게이트가 그보다 위인 1280 이라 히어로의 세로 배치가 어느 폭에서든 같기
     때문이다. 위쪽 헤드라인·문단 크기를 건드리면 이 값은 눈으로 다시 잡아야 한다.

     기본값이 none 인 게 핵심이다. 이건 여백이 남을 때만 나오는 덤이지, 늘 있다가
     좁아지면 숨는 부품이 아니다 — 규칙을 뒤집어 두면 새 화면 폭이 생겼을 때 기본이
     "안 나온다"가 된다.

     히어로(640)가 wrap(1120, 좌우 패딩 24) 안에서 가운데 서므로 한쪽 여백은
     (min(1120,vw) − 688) / 2 이고, wrap 이 1120 에서 멈추니 이 값도 216 에서
     멈춘다. 낙서는 그중 왼쪽 108 을 쓴다(left 108 + 폭 92 → 안쪽 16 에서 끝).

     그래서 "들어가기만 하는" 지점은 여백이 108 이 되는 뷰포트 904px 인데, 게이트는
     한참 위인 1280 이다. 빠듯하게 끼우면 낙서가 아니라 끼워넣은 게 되기 때문이다 —
     1280 에서 여백은 이미 최대치 216 이라 낙서 왼쪽으로 108 이 그대로 빈다.
     hover 조건이 붙은 건 폭만으로는 데스크톱을 가릴 수 없어서다: 큰 태블릿이
     가로로 누우면 1280 을 넘지만 손가락으로 만지는 화면이다.
     크기나 left 를 건드리면 위 계산도 다시 한다. */
  .quokka-doodle { display: none; position: absolute; bottom: -80px; left: -108px;
    width: 92px; height: 120px;
    background: url('assets/quokka-doodle-ink.png') center / contain no-repeat;
    pointer-events: none; user-select: none; opacity: 0.88; }
  [data-theme="dark"] .quokka-doodle { background-image: url('assets/quokka-doodle.png'); }
  @media (min-width: 1280px) and (hover: hover) {
    .quokka-doodle { display: block; }
  }

  /* 낙서는 히어로의 나머지와 같은 값(10px · dur-base · ease-paper)으로 들어오는데
     키프레임만 따로 둔다: 공용 rise 는 끝 키프레임에 투명도 1 을 박아 두는데 이
     낙서의 쉼 투명도는 0.88 이라, 그대로 쓰면 1 까지 올라갔다가 끝에서 0.88 로
     툭 떨어진다. 끝을 비우면 요소 자신의 값으로 안착한다. */
  @keyframes doodle-in {
    from { opacity: 0; transform: translateY(10px); }
  }

  /* 감속을 원하는 사용자에게는 아예 걸리지 않는다 — site.css 가 공용 rise 를
     묶는 방식과 같다. 지연값은 콘텐츠 뒤에 놓는다: 마지막 카드가 360 에 앉고
     발바닥이 420·465·510, 낙서가 560 이다. 장식이 본문보다 먼저 나오면 읽을 것도
     없는데 눈이 먼저 그리로 간다. */
  @media (prefers-reduced-motion: no-preference) {
    .deco-paw { animation: paw-step var(--dur-base) var(--ease-paper) backwards;
      animation-delay: var(--paw-delay, 0ms); }
    .quokka-doodle { animation: doodle-in var(--dur-base) var(--ease-paper) backwards;
      animation-delay: 560ms; }
  }

  @media (max-width: 600px) {
    .mascot-sticker { width: 54px; height: 81px; right: 4px; bottom: -14px; }
  }
</style>
</head>

    <ellipse cx="22.4" cy="17.6" rx="7.4" ry="9.1" transform="rotate(-7 22.4 17.6)"/>
