<!-- 발바닥 정본 — 기본값. index.html · games.html · landing.html · og-cover.html 의
     인라인 mk-paw 심볼이 이 도형을 그대로 복제한다. 외부 스프라이트 참조는 file:// 와
     크로스오리진에서 죽어서 인라인 말고는 방법이 없다. 도형을 고치면 이 파일까지
     다섯 곳을 다 고쳐야 한다.

     세로 길이가 다른 대안 두 개가 같이 관리된다. 축은 발바닥 가로세로비 하나이고,
     발가락 크기와 발바닥 폭은 세 파일이 전부 같다:
       deco-paw-tall.svg  비 1.05 — 거의 정사각. 초기 배포본.
       deco-paw.svg       비 1.29 — 기본값(이 파일). 실제 고양이 범위 1.2~1.4 의 중앙.
       deco-paw-flat.svg  비 1.46 — 가장 눌림.
     셋을 실제 렌더 크기로 비교하려면 paw-shape-compare.html 을 열면 된다.

     viewBox 가 정사각인 이유: 참조하는 쪽이 비율을 기억할 필요가 없어야 한다.
     이전 60×56 은 호출부마다 크기 짝을 맞춰 적어야 했고 실제로 한쪽이 어긋나 있었다.
     도형은 x 1.2..62.8 · y 8.6..55.4 로 상자 안에 여백을 두고 앉는다.

     fill 을 심볼에 거는 이유: SVG 의 기본 fill 은 currentColor 가 아니라 검정이다.
     참조부에서 color 만 바꾸면 다크 테마의 종이 위에 검은 자국이 그대로 남는다. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- 발가락(젤리) 4개. 안쪽 둘은 거의 곧고 바깥 둘은 34° 벌어진다 — 긴 축이
       위-바깥을 향해야 발이 벌어진 것처럼 읽힌다. 발가락과 발바닥 사이 여백(실측
       최소 3.6, 바깥 발가락 쪽)이 이 도형의 유일한 제약이다: 전부 같은 fill 이라
       닿는 순간 union 으로 뭉쳐 발가락이 사라지고 얼룩 하나가 된다.

       바깥 발가락 y 가 안쪽보다 크게 안 떨어지는 이유: 발바닥을 세로로 누르면
       어깨가 위로 올라와 바깥 발가락 쪽으로 다가온다. tall 안의 30.3 을 그대로
       두면 간격이 1.7 로 줄고, 22px 에서 0.6px 라 안티에일리어싱에 먹혀 발가락이
       발바닥과 한 덩어리가 된다. 세로를 누를 땐 발가락도 같이 옮겨야 한다. -->
  <ellipse cx="22.4" cy="17.6" rx="7.4" ry="9.1" transform="rotate(-7 22.4 17.6)"/>
  <ellipse cx="41.6" cy="17.6" rx="7.4" ry="9.1" transform="rotate(7 41.6 17.6)"/>
  <ellipse cx="9.2"  cy="30"   rx="7.4" ry="9.1" transform="rotate(-34 9.2 30)"/>
  <ellipse cx="54.8" cy="30"   rx="7.4" ry="9.1" transform="rotate(34 54.8 30)"/>
  <!-- 발바닥 33.6 × 26.0. 위는 뾰족하고 아래는 넓고 매끈하게 — 가운데 골 하나만
       둔다. 한 번 3엽으로 갈라 봤는데 골이 22px 에서 1.2px 라 엽으로 읽히지 않고
       가장자리가 뜯긴 것처럼만 보였다. 쓰이는 크기가 22px 과 35px 뿐이라, 그
       크기에서 살아남지 못하는 디테일은 형태가 아니라 잡음이다. 좌우 x=32 대칭.

       크기가 이 값인 이유 — 발가락폭/발바닥폭 = 0.44. 고양이는 젤리가 도톰하고
       메인 패드가 아담해서 이 비가 0.42~0.48 이고, 개는 패드가 지배적이라
       0.30~0.35 다. 처음엔 0.33 으로 그려서 고양이 발이 아니라 개 발이었다.
       참고했던 Noun Project 아이콘도 0.38 이라 개 쪽이니 그대로 믿으면 안 된다. -->
  <path d="M32 29.4C35.3 30.6 40.4 32.2 43.2 35.7C46.3 39.4 48.9 42.6 48.8 46.6C48.7 51.3 45.6 55.1 40.6 55.4C37.2 55.6 34.2 54.9 32 53.6C29.8 54.9 26.8 55.6 23.4 55.4C18.4 55.1 15.3 51.3 15.2 46.6C15.1 42.6 17.7 39.4 20.8 35.7C23.6 32.2 28.7 30.6 32 29.4Z"/>
</svg>
