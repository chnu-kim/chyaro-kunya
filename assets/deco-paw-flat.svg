<!-- 발바닥 대안 — flat (발바닥 가로세로비 1.46, 가장 눌림).
     **이 파일은 사이트에서 쓰이지 않는다.** 기본값은 deco-paw.svg(비 1.29) 이고,
     이건 고를 수 있는 대안으로만 보관한다. 채택하려면 아래 좌표를 deco-paw.svg 와
     index.html · landing.html 의 인라인 mk-paw 심볼 세 곳에 복제하면 된다.

     내력: 기본값보다 한 단계 더 누른 안. 실제 고양이 메인 패드 범위(1.2~1.4)를
     살짝 넘어가고, 발가락-발바닥 간격이 2.98 까지 줄어 22px 에서 1.0px 로 남는다
     (기본값은 3.6 → 1.2px). 뭉치지는 않지만 여유가 가장 적은 안이다.

     세 안의 차이는 발바닥 세로 길이 하나뿐이다 — 발가락 크기와 발바닥 폭은 같다.
     실제 렌더 크기 비교는 paw-shape-compare.html 에 있다. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- 발가락과 발바닥 사이 여백 실측 최소 2.98 — 세 안 중 가장 좁다. 같은 fill
       이라 닿으면 union 으로 뭉쳐 발가락이 사라지므로, 좌표를 손대면 다시 재야
       한다. 바깥 발가락 y 가 31.5 인 것은 발바닥을 누르면 어깨가 올라와 발가락에
       다가오기 때문에 함께 올린 결과다. -->
  <ellipse cx="22.4" cy="19.1" rx="7.4" ry="9.1" transform="rotate(-7 22.4 19.1)"/>
  <ellipse cx="41.6" cy="19.1" rx="7.4" ry="9.1" transform="rotate(7 41.6 19.1)"/>
  <ellipse cx="9.2"  cy="31.5" rx="7.4" ry="9.1" transform="rotate(-34 9.2 31.5)"/>
  <ellipse cx="54.8" cy="31.5" rx="7.4" ry="9.1" transform="rotate(34 54.8 31.5)"/>
  <!-- 발바닥 33.6 × 23.0 · 비 1.46 -->
  <path d="M32 30.9C35.3 31.9 40.4 33.4 43.2 36.5C46.3 39.8 48.9 42.6 48.8 46.1C48.7 50.3 45.6 53.7 40.6 53.9C37.2 54.1 34.2 53.4 32 52.3C29.8 53.4 26.8 54.1 23.4 53.9C18.4 53.7 15.3 50.3 15.2 46.1C15.1 42.6 17.7 39.8 20.8 36.5C23.6 33.4 28.7 31.9 32 30.9Z"/>
</svg>
