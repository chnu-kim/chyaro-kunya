<!-- Social cards. og:image is absolute: X and Slack ignore relative paths, so a
     bare "assets/…" silently yields a card with no image. If the repo is ever
     renamed or moved to a custom domain, this URL must move with it. -->

<script>/* apply saved/system theme before first paint — no light-mode flash */try{var t=localStorage.getItem('ck-theme');if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<style>
  .home { padding: var(--space-8) 0 var(--space-9); }
  .home__hero { text-align: center; max-width: 640px; margin: 0 auto var(--space-8); }
  .home__hero .chip { margin-bottom: var(--space-5); }
  /* 작은 컷아웃 스티커 — 스크립트 헤드라인이 이 화면의 플로리시이므로 부차적.
     168px 로 렌더되니 다이컷 테두리는 landing(720px)의 2px 보다 얇아야 같은
     굵기로 보인다. filter 는 CSS 픽셀 기준이라 이미지 원본 크기와 무관하다. */
  .home__photo { width: 168px; margin: 0 auto var(--space-6); position: relative;
    --rest-rot: -3deg; transform: rotate(var(--rest-rot));
    transition: transform var(--dur-base) var(--ease-paper); }
  .home__photo .sticker { --sticker-w: 1.5px; }
  .home__photo:hover { transform: rotate(0deg) translateY(-3px); }
  @media (hover: none) {
    .home__photo:hover { transform: rotate(var(--rest-rot)); }
  }
  /* Face + tracking come from .t-script. The Korean wordmark resolves to Nanum
     Pen Script through --font-script (Sacramento has no Hangul) — a handwritten
     diary title, which is the point. */
  .home__hero h1 { font-size: var(--text-5xl); line-height: 1.05; }
  .home__hero p { color: var(--fg-muted); font-size: var(--text-lg); margin-top: var(--space-3); }

  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-6); }
  /* 쉼 상태를 --rest-rot/--rest-y 로 두는 게 핵심이다. 각도를 transform 에 직접
     박으면 아래 좁은-화면 쿼리가 transform 을 덮을 때 hover·active 까지 같이
     삼켜서, 좁은 창의 키보드 사용자가 lift 를 통째로 잃는다. 변수로 두면 쿼리는
     쉼 상태만 0 으로 덮고 상호작용 규칙은 하나로 유지된다. */
  .navcard { display: block; text-decoration: none; color: inherit; padding: var(--space-7);
    --rest-rot: 0deg; --rest-y: 0px;
    transform: rotate(var(--rest-rot)) translateY(var(--rest-y));
    transition: transform var(--dur-base) var(--ease-paper), box-shadow var(--dur-base); }
  /* 손으로 붙인 두 장이라 각도가 서로의 거울상이 아니다 — 왼쪽 장이 더 많이
     틀어진 채 살짝 내려앉고, 오른쪽은 거의 반듯하다. 세로 오프셋을 왼쪽에만
     주는 건 오른쪽 카드 아래 모서리에 마스코트 스티커가 붙어 있어서다. */
  .navcard:nth-child(1) { --rest-rot: -1.6deg; --rest-y: 9px; }
  .navcard:nth-child(2) { --rest-rot: .6deg; }
  .navcard:hover,
  .navcard:focus-visible { transform: translateY(calc(var(--rest-y) - 4px)); box-shadow: var(--shadow-lift); }
  .navcard:active { transform: translateY(var(--rest-y)); box-shadow: var(--shadow-card); }
  .navcard__ic { width: 44px; height: 44px; color: var(--fg); margin-bottom: var(--space-4); }
  .navcard h2 { font-size: var(--text-2xl); margin-bottom: var(--space-2); }
  .navcard p { color: var(--fg-muted); font-size: var(--text-sm); margin: 0; }

  /* Two columns only once a card can hold a readable measure. At 640px each
     card is 280px wide and 48px of padding leaves 184px of text — about 13
     Korean characters per line; at 601px it drops to 11. So the grid stacks
     well above the 600px "mobile" breakpoint, and only true mobile also loses
     the collage rotation and tightens the padding. */
  @media (max-width: 760px) {
    .cards { grid-template-columns: 1fr; }
    /* 세로 오프셋은 "나란히 붙인 두 장" 을 표현하는 값이라 1열에선 의미가 없다 —
       위아래로 쌓이면 그냥 카드 간격이 어긋난 것으로 보인다. */
    .navcard:nth-child(1) { --rest-y: 0px; }
  }
  @media (max-width: 600px) {
    .navcard { padding: var(--space-5); }
    .navcard:nth-child(1), .navcard:nth-child(2) { --rest-rot: 0deg; }
  }

  /* 발바닥 트레일 — 카드 쪽으로 걸어간 자국.
     Rotations now track one direction of travel instead of scattering across
     60°, the prints alternate above/below the path like real left/right feet,
     and each step is fainter than the next so the row reads as a receding
     trail rather than three evenly spaced glyphs. --paw-dim dims the whole
     trail in dark without flattening that per-step gradient. */
  .deco-paws { display: flex; justify-content: center; align-items: center; gap: 18px;
    color: var(--brand-taupe); margin-bottom: var(--space-7);
    pointer-events: none; user-select: none; }
  .deco-paw { width: 22px; height: 21px; flex-shrink: 0;
    --paw-dim: 1; --paw-fade: .6; opacity: calc(var(--paw-fade) * var(--paw-dim)); }
  .deco-paw:nth-child(1) { --paw-fade: .40; transform: rotate(-10deg) translateY(6px) scale(.94); }
  .deco-paw:nth-child(2) { --paw-fade: .58; transform: rotate(3deg) translateY(-5px); }
  .deco-paw:nth-child(3) { --paw-fade: .78; transform: rotate(12deg) translateY(5px) scale(1.04); }
  [data-theme="dark"] .deco-paw { --paw-dim: .85; }

  /* 마스코트 잉크 스티커 — 순수 장식(aria-hidden)이라 <img> 일 이유가 없다.
     src 로 두면 프리로드 스캐너가 라이트 버전을 먼저 받고 site.js 가 끝에서
     src 를 갈아끼우므로, 다크 사용자는 두 장(25KB + 29KB)을 받고 잘못된 쪽이
     한 프레임 보인다 — 페이지 전체가 무플래시 테마 스크립트를 쓰는데 이것만
     깜빡인다. 배경으로 두면 셀렉터에 걸린 한 장만 받고 깜빡임도 없다.
     절대 위치라 CLS 는 애초에 없고, 높이는 원본비(206:308)로 고정한다. */
  .cards-outer { position: relative; max-width: 880px; margin: 0 auto; }
  .mascot-sticker { position: absolute; bottom: -32px; right: -18px;
    width: 72px; height: 108px;
    background: url('assets/kunyang-mascot-ink.png') center / contain no-repeat;
    transform: rotate(-8deg); pointer-events: none; user-select: none; opacity: 0.88; }
  [data-theme="dark"] .mascot-sticker { background-image: url('assets/kunyang-mascot.png'); }
  @media (max-width: 600px) {
    .mascot-sticker { width: 54px; height: 81px; right: 4px; bottom: -14px; }
  }
</style>
</head>
<body>

<!-- Brand mark · C 카오모지. 쿠냐가 이미 쓰는 얼굴 ﾐ๑•ﻌ•๑ﾐ 를 기하학으로 다시 그린 것.
     A 잉크 도장과 한 쌍으로 확정 — A는 favicon.svg 와 OG 워터마크를 맡는다.
     스펙: logo-identity-directions.html · 인라인인 이유: 외부 스프라이트 <use> 는
     file:// 와 크로스오리진에서 죽는다. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <symbol id="mk-kao" viewBox="0 0 64 22">
    <circle cx="24" cy="6.5" r="3.6"/>
    <circle cx="40" cy="6.5" r="3.6"/>
    <path d="M32 14.3l-3.2-2.8h6.4z"/>
    <g fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round">
      <path d="M32 14.3v1.8"/>
      <path d="M32 16.1c-1.7 3.2-5.8 3.2-6.8-.4"/>
      <path d="M32 16.1c1.7 3.2 5.8 3.2 6.8-.4"/>
      <path d="M3 2.5h9M3 9.5h9M3 16.5h9"/>
      <path d="M52 2.5h9M52 9.5h9M52 16.5h9"/>
    </g>
  </symbol>
</svg>

<!-- One paw definition, referenced three times -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
  <symbol id="paw" viewBox="0 0 60 56">
    <ellipse cx="13" cy="25" rx="5" ry="6" transform="rotate(-20 13 25)"/>
    <ellipse cx="24" cy="16" rx="6" ry="7.5" transform="rotate(-8 24 16)"/>
    <ellipse cx="38" cy="16" rx="6" ry="7.5" transform="rotate(8 38 16)"/>
    <ellipse cx="49" cy="25" rx="5" ry="6" transform="rotate(20 49 25)"/>
    <ellipse cx="31" cy="39" rx="18" ry="14"/>
  </symbol>
</svg>

<div class="page">

  <header class="nav" data-od-id="site-nav">
    <div class="nav__inner">

        <span class="brand__name">챠이로 쿠냐</span>

      <span class="nav__spacer"></span>

        <a class="nav__link" href="landing.html">소개</a>
        <a class="nav__link" href="games.html">게임</a>

        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.6 4.6l1.8 1.8M17.6 17.6l1.8 1.8M19.4 4.6l-1.8 1.8M6.4 17.6l-1.8 1.8"/></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4a7 7 0 1 0 10.5 10.5z"/></svg>
      </button>
    </div>
  </header>

  <main class="home" id="main" data-od-id="home">
    <div class="wrap">
      <div class="home__hero" data-od-id="home-hero">
        <figure class="home__photo rise--photo" data-od-id="home-key-visual">
          <img class="sticker" src="assets/kunya-full-336.png" width="336" height="454" fetchpriority="high"
               alt="챠이로 쿠냐 전신 — 갈색 트윈테일에 날개 달린 흰 고양이가 프린트된 검은 오프숄더 스웨터, 검은 주름 미니스커트와 플랫폼 부츠" />
        </figure>
        <!-- 이름은 바로 아래 h1 이 말한다. 이 칩이 더할 게 있다면 h1 이 못 하는 말,
             즉 "공식이 아니다" 뿐이다. -->
        <span class="chip chip--ink t-caps rise" style="--rise-delay:180ms">Unofficial Fan Site</span>
        <h1 class="t-script rise" data-od-id="home-title" style="--rise-delay:240ms">챠이로 쿠냐</h1>
        <p class="rise" style="--rise-delay:300ms">갈색 고양이 버추얼 스트리머의 작은 다꾸 노트. <span class="t-hand" style="font-size:var(--text-xl)">어서오냥, 쿠냥이 ♡</span></p>
      </div>

      <!-- 발바닥 트레일 — 걷는 흔적 -->
      <div class="deco-paws" aria-hidden="true">
        <svg class="deco-paw" fill="currentColor"><use href="#paw"/></svg>
        <svg class="deco-paw" fill="currentColor"><use href="#paw"/></svg>
        <svg class="deco-paw" fill="currentColor"><use href="#paw"/></svg>
      </div>

      <div class="cards-outer rise" style="--rise-delay:360ms">
        <div class="cards" data-od-id="home-nav-cards">
          <!-- 카드 전체가 <a> 다. 안에 "보러가기 →" 를 또 두면 링크 안의 가짜 링크가
               되고, 목적지가 다른 두 카드가 같은 라벨을 달게 된다. 목적지 이름은
               h2 가 말하고, 눌린다는 신호는 hover·focus lift 와 커서가 맡는다. -->
          <a class="paper navcard" href="landing.html" data-od-id="nav-card-about">
            <span class="tape" aria-hidden="true">쿠냐 ♡</span>
            <!-- 사람 실루엣이 아니라 고양이 얼굴인 이유: 이 사이트의 아이콘 언어는
                 고양이·발바닥·카오모지다(AGENTS.md §3). 눈은 h 0.01 짜리 선분에
                 stroke-linecap: round 를 걸어 점으로 만든다 — 옆 게임패드 아이콘이
                 이미 쓰는 관용구라 두 아이콘의 획이 같은 손에서 나온 것처럼 보인다. -->
            <svg class="navcard__ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="12" cy="14" r="7.2"/>
              <path d="M6.8 9.6 5.2 3.6l5.2 3.3M17.2 9.6l1.6-6-5.2 3.3"/>
              <path d="M9.5 13h.01M14.5 13h.01"/>
              <path d="M12 15.8v.7"/>
              <path d="M12 16.5c-.6 1.1-2.2 1.1-2.6-.2M12 16.5c.6 1.1 2.2 1.1 2.6-.2"/>
            </svg>
            <h2>소개</h2>
            <p>영원한 20살 INFP 고양이. 프로필과 저챗·게임·노래 이야기, 그리고 채널 세 곳.</p>
          </a>

          <a class="paper navcard" href="games.html" data-od-id="nav-card-games">
            <span class="clip" aria-hidden="true"></span>
            <svg class="navcard__ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2.5" y="7" width="19" height="10.5" rx="3.5"/><path d="M7.5 11v3M6 12.5h3M15.5 11.5h.01M18 13.5h.01"/></svg>
            <h2>플레이 게임</h2>
            <p>방송에서 플레이한 게임 보드. 직접 추가·삭제하고 상태로 골라볼 수 있어요.</p>
          </a>
        </div>
        <span class="mascot-sticker" aria-hidden="true"></span>
      </div>

  </main>

      </div>

      <img class="foot__mascot" src="assets/kunyang-mascot.png" width="206" height="308"
           alt="" aria-hidden="true" loading="lazy" decoding="async" />
    </div>
  </footer>
